# MySQL
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/task_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# JWT
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production}
  expiration: 86400000

# CORS
cors:
  allowed-origins:
    - http://127.0.0.1:5173
    - http://localhost:5173
